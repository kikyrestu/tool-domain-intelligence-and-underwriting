services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: domainiq
      POSTGRES_PASSWORD: domainiq
      POSTGRES_DB: domainiq
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U domainiq"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://domainiq:domainiq@db:5432/domainiq
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8888 --reload

volumes:
  pgdata:
